name: Publication des images de staging

# Construit et publie les 3 images (api, worker, web) vers GitHub
# Container Registry (ghcr.io) a chaque fusion sur main — utilise
# UNIQUEMENT le compte GitHub existant du depot (GITHUB_TOKEN fourni
# automatiquement par Actions), aucun compte ou secret externe requis
# pour cette etape.
#
# Ce workflow NE DEPLOIE PAS lui-meme sur le serveur de staging (aucun
# acces SSH a une machine externe n'est configure ici, par choix — voir
# docs/deployment/staging.md). Le redeploiement sur le serveur se fait
# via infra/scripts/deploy-staging.sh, execute manuellement ou via une
# action separee que vous controlez (cron, webhook, etc.), pour eviter
# de donner a ce depot un acces direct et automatique a votre serveur.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - name: Connexion a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build et publication de l'image ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service }}/Dockerfile
          push: true
          # NEXT_PUBLIC_API_URL n'a de sens que pour l'image web (Next.js
          # l'inline au build) ; ignore silencieusement pour api/worker.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
